<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to PDF — Pglue</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="brand">🧩 P<span>glue</span></a>
    <nav class="site-nav"><a href="../index.html">All tools</a></nav>
  </header>

  <main class="tool-main">
    <a href="../index.html" class="back">← All tools</a>
    <div class="tool-head">
      <h1>🖼️ Image → PDF</h1>
      <p>Combine your images into a single PDF — one image per page, in order.</p>
    </div>

    <div id="drop" class="drop">
      <div class="ic">📁</div>
      <p><strong>Drag &amp; drop images</strong> or click to choose</p>
      <p class="muted small">JPG, PNG, WebP · they'll be added in the order shown</p>
    </div>
    <input type="file" id="file" accept="image/*" multiple hidden />

    <div id="panel" class="panel hidden">
      <ul id="list" class="file-list"></ul>
      <div class="row" style="margin-top:16px; justify-content:center;">
        <button id="make" class="btn primary">📄 Create PDF</button>
        <button id="clear" class="btn ghost">Clear</button>
      </div>
      <div id="status" class="result hidden"></div>
    </div>
  </main>

  <footer class="site-foot"><p>🔒 100% client-side · <a href="https://github.com/aashishbharti04/file-toolkit" target="_blank" rel="noopener">⭐ Star on GitHub</a></p></footer>

  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="../assets/common.js"></script>
  <script>
    let queue = [];
    const drop = document.getElementById("drop");
    const file = document.getElementById("file");
    const panel = document.getElementById("panel");
    const list = document.getElementById("list");
    const status = document.getElementById("status");

    document.getElementById("clear").addEventListener("click", () => { queue = []; render(); panel.classList.add("hidden"); status.classList.add("hidden"); });
    document.getElementById("make").addEventListener("click", makePdf);

    setupDrop({ drop, input: file, accept: (f) => f.type.startsWith("image/"),
      onFiles: (files) => { queue.push(...[...files]); panel.classList.remove("hidden"); render(); } });

    function render() {
      list.innerHTML = "";
      queue.forEach((f, i) => {
        const li = document.createElement("li");
        li.innerHTML = `<img src="${URL.createObjectURL(f)}" alt="">
          <div class="nm">${i + 1}. ${f.name}<div class="sz">${formatBytes(f.size)}</div></div>
          <button class="rm" title="Remove">✕</button>`;
        li.querySelector(".rm").addEventListener("click", () => { queue.splice(i, 1); render(); });
        list.appendChild(li);
      });
    }

    // Convert any image to PNG bytes via canvas (robust for all formats)
    async function toPngBytes(f) {
      const img = await loadImage(f);
      const canvas = imageToCanvas(img);
      const blob = await canvasToBlob(canvas, "image/png");
      return { bytes: new Uint8Array(await blob.arrayBuffer()), w: canvas.width, h: canvas.height };
    }

    async function makePdf() {
      if (!queue.length) return;
      status.classList.remove("hidden");
      status.innerHTML = "Building PDF…";
      const { PDFDocument } = PDFLib;
      const pdf = await PDFDocument.create();
      for (const f of queue) {
        const { bytes, w, h } = await toPngBytes(f);
        const png = await pdf.embedPng(bytes);
        const page = pdf.addPage([w, h]);
        page.drawImage(png, { x: 0, y: 0, width: w, height: h });
      }
      const out = await pdf.save();
      const blob = new Blob([out], { type: "application/pdf" });
      downloadBlob(blob, "images.pdf");
      status.innerHTML = `✅ Done — <b>${queue.length} page(s)</b>, ${formatBytes(blob.size)}. Your download should start automatically.`;
    }
  </script>
</body>
</html>
