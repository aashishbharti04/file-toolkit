<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compress Image — Pglu</title>
  <link rel="stylesheet" href="../assets/style.css?v=2" />
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="brand">🧩 P<span>glu</span></a>
    <nav class="site-nav"><a href="../index.html">All tools</a></nav>
  </header>

  <main class="tool-main">
    <a href="../index.html" class="back">← All tools</a>
    <div class="tool-head">
      <h1>🗜️ Compress Image</h1>
      <p>Reduce image file size right in your browser. Nothing is uploaded.</p>
    </div>

    <div id="drop" class="drop">
      <div class="ic">📁</div>
      <p><strong>Drag &amp; drop images</strong> or click to choose</p>
      <p class="muted small">JPG, PNG, WebP · batch supported</p>
    </div>
    <input type="file" id="file" accept="image/*" multiple hidden />

    <div id="panel" class="panel hidden">
      <div class="row">
        <label class="field"><span>Quality <b id="qL">80%</b></span>
          <input type="range" id="quality" min="10" max="100" value="80" /></label>
        <label class="field"><span>Max width <b id="wL">1920px</b></span>
          <input type="range" id="maxw" min="320" max="4000" step="80" value="1920" /></label>
      </div>
      <div id="summary" class="result hidden"></div>
      <ul id="list" class="file-list"></ul>
      <div class="row" style="margin-top:16px; justify-content:center;">
        <button id="dlAll" class="btn primary">⬇️ Download all</button>
        <button id="clear" class="btn ghost">Clear</button>
      </div>
    </div>
  </main>

  <footer class="site-foot"><p>🔒 100% client-side · <a href="https://github.com/aashishbharti04/file-toolkit" target="_blank" rel="noopener">⭐ Star on GitHub</a></p></footer>

  <script src="../assets/common.js?v=2"></script>
  <script>
    let queue = [];
    const drop = document.getElementById("drop");
    const file = document.getElementById("file");
    const panel = document.getElementById("panel");
    const list = document.getElementById("list");
    const summary = document.getElementById("summary");
    const quality = document.getElementById("quality");
    const maxw = document.getElementById("maxw");

    quality.addEventListener("input", () => qL.textContent = quality.value + "%");
    maxw.addEventListener("input", () => wL.textContent = maxw.value + "px");
    [quality, maxw].forEach((el) => el.addEventListener("change", run));
    document.getElementById("clear").addEventListener("click", () => { queue = []; list.innerHTML = ""; panel.classList.add("hidden"); });
    document.getElementById("dlAll").addEventListener("click", () =>
      document.querySelectorAll(".dl").forEach((b, i) => setTimeout(() => b.click(), i * 250)));

    setupDrop({ drop, input: file, accept: (f) => f.type.startsWith("image/"),
      onFiles: (files) => { queue.push(...[...files]); run(); } });

    async function run() {
      if (!queue.length) return;
      panel.classList.remove("hidden");
      list.innerHTML = "";
      let tin = 0, tout = 0;
      for (const f of queue) {
        const img = await loadImage(f);
        const canvas = imageToCanvas(img, Number(maxw.value));
        const blob = await canvasToBlob(canvas, "image/jpeg", Number(quality.value) / 100);
        tin += f.size; tout += blob.size;
        list.appendChild(item(f, blob));
      }
      const pct = Math.round((1 - tout / tin) * 100);
      summary.classList.remove("hidden");
      summary.innerHTML = `${queue.length} image(s): ${formatBytes(tin)} → <b>${formatBytes(tout)}</b> · <span class="saved ${pct<0?'up':''}">${pct>=0?'saved '+pct+'%':'grew '+Math.abs(pct)+'%'}</span>`;
    }

    function item(f, blob) {
      const pct = Math.round((1 - blob.size / f.size) * 100);
      const name = f.name.replace(/\.[^.]+$/, "") + "-compressed.jpg";
      const li = document.createElement("li");
      li.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="">
        <div class="nm">${name}<div class="sz">${formatBytes(f.size)} → ${formatBytes(blob.size)} · <span class="saved ${pct<0?'up':''}">${pct>=0?'−'+pct:'+'+Math.abs(pct)}%</span></div></div>
        <button class="btn dl">⬇️</button>`;
      li.querySelector(".dl").addEventListener("click", () => downloadBlob(blob, name));
      return li;
    }
  </script>
</body>
</html>
