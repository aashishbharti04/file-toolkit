<svg width="1280" height="840" viewBox="0 0 1280 840" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8e75b2"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1280" height="840" fill="#eef1f5"/>

  <!-- header -->
  <rect x="0" y="0" width="1280" height="78" fill="#ffffff"/>
  <text x="64" y="50" font-size="26" font-weight="800" fill="#1f2328">🧰 File<tspan fill="#8e75b2">Toolkit</tspan></text>
  <text x="1130" y="50" font-size="16" font-weight="600" fill="#636c76">⭐ GitHub</text>

  <!-- hero -->
  <text x="640" y="150" text-anchor="middle" font-size="36" font-weight="800" fill="#1f2328">12 free tools for <tspan fill="url(#grad)">PDFs &amp; images</tspan></text>
  <text x="640" y="186" text-anchor="middle" font-size="17" fill="#636c76">Merge · split · compress · rotate · watermark · convert &amp; more — 100% private, nothing uploaded.</text>

  <!-- 12 tool cards: 4 cols x 3 rows -->
  <g font-family="Segoe UI, system-ui, sans-serif">
    <!-- Row 1 -->
    <g><rect x="110" y="240" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="134" y="262" width="42" height="42" rx="10" fill="#fde8e9"/><text x="155" y="291" text-anchor="middle" font-size="20">🔗</text><text x="190" y="285" font-size="16" font-weight="700" fill="#1f2328">Merge PDF</text><text x="134" y="338" font-size="12" fill="#636c76">Combine PDFs into one.</text></g>
    <g><rect x="380" y="240" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="404" y="262" width="42" height="42" rx="10" fill="#fdf0db"/><text x="425" y="291" text-anchor="middle" font-size="20">✂️</text><text x="460" y="285" font-size="16" font-weight="700" fill="#1f2328">Split PDF</text><text x="404" y="338" font-size="12" fill="#636c76">Extract a page range.</text></g>
    <g><rect x="650" y="240" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="674" y="262" width="42" height="42" rx="10" fill="#e6f8ee"/><text x="695" y="291" text-anchor="middle" font-size="20">🗜️</text><text x="730" y="285" font-size="16" font-weight="700" fill="#1f2328">Compress PDF</text><text x="674" y="338" font-size="12" fill="#636c76">Shrink the file size.</text></g>
    <g><rect x="920" y="240" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="944" y="262" width="42" height="42" rx="10" fill="#e7e9fd"/><text x="965" y="291" text-anchor="middle" font-size="20">🔄</text><text x="1000" y="285" font-size="16" font-weight="700" fill="#1f2328">Rotate PDF</text><text x="944" y="338" font-size="12" fill="#636c76">Rotate all pages.</text></g>
    <!-- Row 2 -->
    <g><rect x="110" y="380" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="134" y="402" width="42" height="42" rx="10" fill="#feeede"/><text x="155" y="431" text-anchor="middle" font-size="20">🗂️</text><text x="190" y="425" font-size="16" font-weight="700" fill="#1f2328">Organize PDF</text><text x="134" y="478" font-size="12" fill="#636c76">Reorder or delete pages.</text></g>
    <g><rect x="380" y="380" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="404" y="402" width="42" height="42" rx="10" fill="#e0f2fe"/><text x="425" y="431" text-anchor="middle" font-size="20">💧</text><text x="460" y="425" font-size="16" font-weight="700" fill="#1f2328">Watermark</text><text x="404" y="478" font-size="12" fill="#636c76">Stamp text on pages.</text></g>
    <g><rect x="650" y="380" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="674" y="402" width="42" height="42" rx="10" fill="#f3e8ff"/><text x="695" y="431" text-anchor="middle" font-size="20">#️⃣</text><text x="730" y="425" font-size="16" font-weight="700" fill="#1f2328">Page Numbers</text><text x="674" y="478" font-size="12" fill="#636c76">Number every page.</text></g>
    <g><rect x="920" y="380" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="944" y="402" width="42" height="42" rx="10" fill="#efe9f6"/><text x="965" y="431" text-anchor="middle" font-size="20">🖼️</text><text x="1000" y="425" font-size="16" font-weight="700" fill="#1f2328">Image → PDF</text><text x="944" y="478" font-size="12" fill="#636c76">Images into a PDF.</text></g>
    <!-- Row 3 -->
    <g><rect x="110" y="520" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="134" y="542" width="42" height="42" rx="10" fill="#e4edfd"/><text x="155" y="571" text-anchor="middle" font-size="20">📸</text><text x="190" y="565" font-size="16" font-weight="700" fill="#1f2328">PDF → JPG</text><text x="134" y="618" font-size="12" fill="#636c76">Pages to images.</text></g>
    <g><rect x="380" y="520" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="404" y="542" width="42" height="42" rx="10" fill="#e6f8ee"/><text x="425" y="571" text-anchor="middle" font-size="20">🗜️</text><text x="460" y="565" font-size="16" font-weight="700" fill="#1f2328">Compress Image</text><text x="404" y="618" font-size="12" fill="#636c76">Reduce image size.</text></g>
    <g><rect x="650" y="520" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="674" y="542" width="42" height="42" rx="10" fill="#e0f5fa"/><text x="695" y="571" text-anchor="middle" font-size="20">📐</text><text x="730" y="565" font-size="16" font-weight="700" fill="#1f2328">Resize Image</text><text x="674" y="618" font-size="12" fill="#636c76">Set an exact width.</text></g>
    <g><rect x="920" y="520" width="250" height="120" rx="14" fill="#fff" stroke="#e2e6ea"/><rect x="944" y="542" width="42" height="42" rx="10" fill="#fce7f1"/><text x="965" y="571" text-anchor="middle" font-size="20">🔄</text><text x="1000" y="565" font-size="16" font-weight="700" fill="#1f2328">Convert Image</text><text x="944" y="618" font-size="12" fill="#636c76">JPG · PNG · WebP.</text></g>
  </g>

  <text x="640" y="700" text-anchor="middle" font-size="15" fill="#9aa3ad">🔒 100% client-side · no uploads · no tracking · free &amp; open source</text>
</svg>
