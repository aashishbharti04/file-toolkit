<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8e75b2"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- page bg -->
  <rect width="1280" height="760" fill="#eef1f5"/>

  <!-- browser window -->
  <g filter="url(#shadow)">
    <rect x="80" y="50" width="1120" height="660" rx="16" fill="#f6f8fa" stroke="#e2e6ea"/>
    <!-- header bar -->
    <rect x="80" y="50" width="1120" height="64" rx="16" fill="#ffffff"/>
    <rect x="80" y="98" width="1120" height="16" fill="#ffffff"/>
    <text x="116" y="90" font-size="24" font-weight="800" fill="#1f2328">🧰 File<tspan fill="#8e75b2">Toolkit</tspan></text>
    <text x="1060" y="90" font-size="16" font-weight="600" fill="#636c76">⭐ GitHub</text>
  </g>

  <!-- hero -->
  <text x="640" y="180" text-anchor="middle" font-size="38" font-weight="800" fill="#1f2328">Every tool you need for</text>
  <text x="640" y="226" text-anchor="middle" font-size="38" font-weight="800" fill="url(#grad)">PDFs &amp; images, in one place.</text>
  <text x="640" y="262" text-anchor="middle" font-size="17" fill="#636c76">Merge · split · compress · resize · convert — free, fast, and 100% private. Nothing is uploaded.</text>

  <!-- tool cards -->
  <g>
    <!-- card template: rect + icon chip + title + desc -->
    <!-- row 1 -->
    <g>
      <rect x="170" y="320" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="194" y="344" width="46" height="46" rx="11" fill="#fde8e9"/><text x="217" y="376" text-anchor="middle" font-size="22">🔗</text>
      <text x="194" y="418" font-size="17" font-weight="700" fill="#1f2328">Merge PDF</text>
      <text x="194" y="442" font-size="12.5" fill="#636c76">Combine PDFs into one.</text>
    </g>
    <g>
      <rect x="390" y="320" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="414" y="344" width="46" height="46" rx="11" fill="#fdf0db"/><text x="437" y="376" text-anchor="middle" font-size="22">✂️</text>
      <text x="414" y="418" font-size="17" font-weight="700" fill="#1f2328">Split PDF</text>
      <text x="414" y="442" font-size="12.5" fill="#636c76">Extract a page range.</text>
    </g>
    <g>
      <rect x="610" y="320" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="634" y="344" width="46" height="46" rx="11" fill="#efe9f6"/><text x="657" y="376" text-anchor="middle" font-size="22">🖼️</text>
      <text x="634" y="418" font-size="17" font-weight="700" fill="#1f2328">Image → PDF</text>
      <text x="634" y="442" font-size="12.5" fill="#636c76">Images into a PDF.</text>
    </g>
    <g>
      <rect x="830" y="320" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="854" y="344" width="46" height="46" rx="11" fill="#e4edfd"/><text x="877" y="376" text-anchor="middle" font-size="22">📸</text>
      <text x="854" y="418" font-size="17" font-weight="700" fill="#1f2328">PDF → JPG</text>
      <text x="854" y="442" font-size="12.5" fill="#636c76">Pages to images.</text>
    </g>
    <!-- row 2 -->
    <g>
      <rect x="280" y="500" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="304" y="524" width="46" height="46" rx="11" fill="#e6f8ee"/><text x="327" y="556" text-anchor="middle" font-size="22">🗜️</text>
      <text x="304" y="598" font-size="17" font-weight="700" fill="#1f2328">Compress</text>
      <text x="304" y="622" font-size="12.5" fill="#636c76">Shrink image size.</text>
    </g>
    <g>
      <rect x="500" y="500" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="524" y="524" width="46" height="46" rx="11" fill="#e0f5fa"/><text x="547" y="556" text-anchor="middle" font-size="22">📐</text>
      <text x="524" y="598" font-size="17" font-weight="700" fill="#1f2328">Resize</text>
      <text x="524" y="622" font-size="12.5" fill="#636c76">Set an exact width.</text>
    </g>
    <g>
      <rect x="720" y="500" width="200" height="150" rx="14" fill="#ffffff" stroke="#e2e6ea"/>
      <rect x="744" y="524" width="46" height="46" rx="11" fill="#fce7f1"/><text x="767" y="556" text-anchor="middle" font-size="22">🔄</text>
      <text x="744" y="598" font-size="17" font-weight="700" fill="#1f2328">Convert</text>
      <text x="744" y="622" font-size="12.5" fill="#636c76">JPG · PNG · WebP.</text>
    </g>
  </g>

  <text x="640" y="695" text-anchor="middle" font-size="15" fill="#9aa3ad">🔒 100% client-side · no uploads · no tracking · open source</text>
</svg>
